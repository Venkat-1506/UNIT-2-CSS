<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors - Basic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Basic Selectors</h1>

    <p>This paragraph uses the Element Selector.</p>

    <p class="highlight">This paragraph uses the Class Selector.</p>

    <p id="special">This paragraph uses the ID Selector.</p>

    <h2>Group Selector Example</h2>

    <div>
        <p>Paragraph inside div (Element selector still applies).</p>
    </div>

</body>
</html>
