<!DOCTYPE html>
<html>
<head>
    <title>Advanced CSS Selectors</title>
    <link rel="stylesheet" href="advanced-selectors.css">
</head>
<body>

    <h1>Advanced CSS Selectors</h1>

    <div class="container">
        <p>This paragraph is selected using Descendant Selector.</p>
        <span>
            <p>This paragraph tests Child Selector.</p>
        </span>
    </div>

    <h2>Adjacent Sibling Example</h2>
    <p>This paragraph comes immediately after h2.</p>

    <h3>Attribute Selector Example</h3>
    <input type="text" placeholder="Text Field">
    <input type="password" placeholder="Password Field">

</body>
</html>
