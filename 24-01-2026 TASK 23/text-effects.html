<!DOCTYPE html>
<html>
<head>
    <title>Text Effects & Web Fonts</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="text-effects.css">
</head>
<body>

    <h1 class="google-font">Text Effects in CSS</h1>

    <p class="underline">This text is underlined.</p>

    <p class="uppercase">This text is uppercase.</p>

    <p class="spacing">This text has letter spacing.</p>

    <p class="shadow">This text has a shadow effect.</p>

</body>
</html>
