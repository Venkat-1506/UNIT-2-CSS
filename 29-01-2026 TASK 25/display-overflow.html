<!DOCTYPE html>
<html>
<head>
    <title>Display and Overflow</title>
    <link rel="stylesheet" href="display-overflow.css">
</head>
<body>

    <h1>Display & Overflow</h1>

    <div class="block">Block Element</div>
    <span class="inline">Inline Element</span>

    <div class="inline-block">Inline-Block Element</div>

    <div class="overflow-box">
        This box has limited height and width. 
        If the content exceeds the size, 
        overflow property will control it.
        This is extra content to demonstrate overflow behavior.
    </div>
