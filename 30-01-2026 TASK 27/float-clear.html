<!DOCTYPE html>
<html>
<head>
    <title>Float and Clear</title>
    <link rel="stylesheet" href="float-clear.css">
</head>
<body>

    <h1>Float & Clear Example</h1>

    <div class="box left">Float Left</div>
    <div class="box right">Float Right</div>

    <p class="text">
        This paragraph flows around the floated elements.
        Float property allows elements to move left or right.
    </p>

    <div class="clear-box">
        This box uses clear property.
    </div>

</body>
</html>
